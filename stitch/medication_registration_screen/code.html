<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f33",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top App Bar -->
<header class="sticky top-0 z-10 flex items-center bg-background-light/80 backdrop-blur-md px-4 py-4 justify-between border-b border-primary/10">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-10">약 등록</h1>
</header>
<main class="flex-1 px-4 py-6 space-y-8 max-w-md mx-auto w-full">
<!-- Medication Name Input -->
<section class="space-y-2">
<label class="block text-slate-900 dark:text-slate-100 text-lg font-bold">약 이름</label>
<div class="flex">
<input class="form-input flex w-full h-14 rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-2 focus:ring-primary/20 placeholder:text-slate-400 p-4 text-base font-normal transition-all" placeholder="예: 혈압약 A" type="text"/>
</div>
</section>
<!-- Intake Time Selection -->
<section class="space-y-2">
<label class="block text-slate-900 dark:text-slate-100 text-lg font-bold">복용 시간</label>
<button class="flex w-full h-14 items-center justify-between rounded-xl bg-white dark:bg-slate-800 border border-primary/20 px-4 text-slate-900 dark:text-slate-100 hover:bg-primary/5 transition-colors">
<span class="text-base font-medium">시간 선택</span>
<span class="material-symbols-outlined text-primary">schedule</span>
</button>
</section>
<!-- Frequency per Day -->
<section class="space-y-2">
<label class="block text-slate-900 dark:text-slate-100 text-lg font-bold">하루 횟수</label>
<div class="grid grid-cols-3 gap-3">
<button class="h-14 rounded-xl border-2 border-primary bg-primary/10 text-primary font-bold transition-all">1회</button>
<button class="h-14 rounded-xl border border-primary/20 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium hover:border-primary/50">2회</button>
<button class="h-14 rounded-xl border border-primary/20 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-medium hover:border-primary/50">3회 이상</button>
</div>
</section>
<!-- Start Date Selection -->
<section class="space-y-2">
<label class="block text-slate-900 dark:text-slate-100 text-lg font-bold">시작일</label>
<button class="flex w-full h-14 items-center justify-between rounded-xl bg-white dark:bg-slate-800 border border-primary/20 px-4 text-slate-900 dark:text-slate-100 hover:bg-primary/5 transition-colors">
<span class="text-base font-medium">날짜 선택</span>
<span class="material-symbols-outlined text-primary">calendar_today</span>
</button>
</section>
<!-- Intake Timing Segmented Control -->
<section class="space-y-2">
<label class="block text-slate-900 dark:text-slate-100 text-lg font-bold">복용 시점</label>
<div class="flex p-1 bg-slate-200 dark:bg-slate-700 rounded-xl">
<button class="flex-1 h-12 rounded-lg text-slate-600 dark:text-slate-400 font-bold transition-all">식전</button>
<button class="flex-1 h-12 rounded-lg bg-primary text-white font-bold shadow-sm transition-all">식후</button>
</div>
</section>
</main>
<!-- Bottom Action Buttons -->
<footer class="p-4 bg-background-light dark:bg-background-dark border-t border-primary/10 flex gap-4 max-w-md mx-auto w-full">
<button class="flex-1 h-14 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold text-lg hover:bg-slate-50 transition-colors">
                뒤로
            </button>
<button class="flex-[2] h-14 rounded-xl bg-primary text-white font-bold text-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all active:scale-[0.98]">
                저장하기
            </button>
</footer>
<!-- Extra spacing for safety on some devices -->
<div class="h-6 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
